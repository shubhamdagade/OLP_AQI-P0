<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>One Lodha Place | Air Quality Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-white: #FFFFFF;
            --divider: rgba(255, 255, 255, 0.35);
        }
        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex; align-items: center;
            cursor: none;
            color: var(--text-white);
        }
 
        /* Background rotation layers */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        .bg-layer.active { opacity: 1; }
 
        /* Video overlay (high-AQI alert) */
        #video-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: black;
            z-index: 1000;
        }
        #warning-video { width: 100%; height: 100%; object-fit: cover; }
 
        .dashboard-container {
            position: relative;
            display: flex; width: 100%; height: 100%;
            padding: 0 6vw; box-sizing: border-box;
            align-items: center; justify-content: space-between;
        }
 
        /* LEFT: headline */
        .text-panel {
            flex: 0 0 55%;
        }
        .live-tag {
            font-size: 3vh;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1vw;
            color: var(--text-white);
            margin-bottom: 4vh;
        }
        .headline {
            font-size: 6vh;
            font-weight: 400;
            color: var(--text-white);
            line-height: 1.1;
            margin: 0;
            letter-spacing: 0.05vw;
        }
        .status-word {
            display: block;
            font-weight: 600;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 0.1vw;
            margin-top: 0.3vh;
        }
 
        /* RIGHT: floating numerals, no card chrome */
        .cards-panel {
            flex: 0 0 28vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        .card {
            padding: 2vh 0;
            text-align: center;
            box-sizing: border-box;
            width: 100%;
        }
        .location-label {
            font-size: 3vh;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15vw;
            color: var(--text-white);
            margin-bottom: 3vh;
        }
        .aqi-number {
            font-size: 13vh;
            font-weight: 200;
            color: var(--text-white);
            margin: 0;
            line-height: 1;
            letter-spacing: -0.4vh;
        }
        .metrics-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 2.5vh;
        }
        .metric-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 2vw;
        }
        .m-label {
            font-size: 2.5vh;
            font-weight: 500;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 0.1vw;
            margin-bottom: 0.6vh;
        }
        .m-val {
            font-size: 3vh;
            font-weight: 500;
            color: var(--text-white);
        }
        .v-divider {
            width: 1px;
            background: var(--divider);
            height: 4.5vh;
        }
 
        /* Horizontal divider — auto-hides when only OLP visible */
        .h-divider {
            width: 70%;
            height: 1px;
            background: var(--divider);
            margin: 2vh 0;
        }
        .cards-panel:has(#external-card.hidden) .h-divider {
            display: none;
        }
 
        .hidden { display: none !important; }
    </style>
</head>
<body id="main-ui">
 
    <!-- Background rotation layers -->
    <div class="bg-layer active" id="bg-1" style="background-image: url('p1.jpg')"></div>
    <div class="bg-layer" id="bg-2" style="background-image: url('p2.jpg')"></div>
    <div class="bg-layer" id="bg-3" style="background-image: url('p3.jpg')"></div>
 
    <div id="video-overlay">
        <video id="warning-video" loop muted playsinline>
            <source src="OLPJanuary.mp4" type="video/mp4">
        </video>
    </div>
 
    <div class="dashboard-container" id="dashboard-wrapper">
        <div class="text-panel">
            <div class="live-tag">Live AQI</div>
            <h1 class="headline">Indoor air quality is<span class="status-word" id="status-text">Excellent</span></h1>
       </div>
        <div class="cards-panel">
            <div class="card" id="internal-card">
                <div class="location-label">One Lodha Place</div>
                <div class="aqi-number" id="in-aqi">--</div>
                <div class="metrics-grid">
                    <div class="metric-block">
                        <span class="m-label">PM 2.5</span>
                        <span class="m-val"><span id="in-pm25">--</span></span>
                    </div>
                    <div class="v-divider"></div>
                    <div class="metric-block">
                        <span class="m-label">PM 10</span>
                        <span class="m-val"><span id="in-pm10">--</span></span>
                    </div>
                </div>
            </div>
            <div class="h-divider"></div>
            <div class="card" id="external-card">
                <div class="location-label">Worli</div>
                <div class="aqi-number" id="out-aqi">--</div>
                <div class="metrics-grid">
                    <div class="metric-block">
                        <span class="m-label">PM 2.5</span>
                        <span class="m-val"><span id="out-pm25">--</span></span>
                    </div>
                    <div class="v-divider"></div>
                    <div class="metric-block">
                        <span class="m-label">PM 10</span>
                        <span class="m-val"><span id="out-pm10">--</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
 
    <script>
        // --- Background rotator (30s hold, 2s crossfade) ---
        const BG_LAYERS = ['bg-1', 'bg-2', 'bg-3'];
        let bgIndex = 0;
        setInterval(() => {
            document.getElementById(BG_LAYERS[bgIndex]).classList.remove('active');
            bgIndex = (bgIndex + 1) % BG_LAYERS.length;
            document.getElementById(BG_LAYERS[bgIndex]).classList.add('active');
        }, 30000);
 
        // --- AQI data fetch (unchanged logic) ---
        const K_KEY = 'nomjPNZHYkGzzP5YIJePqI2cUON67v1pj9JPXb8BpcgnC5VX';
        const GOOGLE_KEY = 'AIzaSyCoDosnEp6Hs4fz4eR4fTw9D9xsvhUAEx8';
        const LAT = 19.0000, LON = 72.8200;
        const DEVICE_IDS = ['0d7dab01-e1c1-42f2-b266-9bd80694e4a1', 'db410241-f3de-401e-a569-473de7c0ceb3', '910d75c5-eedd-4e0c-b4f3-38436eb7aab8', '1b90f659-463e-46f7-8741-bf2509845187', 'cb56dee8-dc39-4888-98bb-e8c2e5e36890', '7cb9a5be-e47d-4c7c-9b30-8d880699f72c','02ef3916-9526-4713-8a3e-55b528789d74','22a54044-b202-4cdd-94b5-dc83fecb909f'];
 
        function calcAQI(pm) {
            if (pm <= 30) return Math.round(pm * 50 / 30);
            if (pm <= 60) return Math.round(50 + (pm - 30) * (50 / 30));
            if (pm <= 90) return Math.round(100 + (pm - 60) * (100 / 30));
            if (pm <= 120) return Math.round(200 + (pm - 90) * (100 / 30));
            if (pm <= 250) return Math.round(300 + (pm - 120) * (100 / 130));
            return 500;
        }
 
        async function updateData() {
            try {
                let inAQI = 0, outAQI = 0;
 
                // --- Internal Sensors (Kaiterra) ---
                const fetches = DEVICE_IDS.map(id => fetch(`https://api.kaiterra.com/v1/devices/${id}/top?key=${K_KEY}`).then(r => r.json()));
                const results = await Promise.allSettled(fetches);
                let pm25List = [], pm10List = [];
 
                results.forEach(res => {
                    if (res.status === 'fulfilled' && res.value.data) {
                        const d = res.value.data;
                        pm25List.push(d.find(x => x.param === 'rpm25c').points[0].value);
                        pm10List.push(d.find(x => x.param === 'rpm10c').points[0].value);
                    }
                });
 
                if (pm25List.length > 0) {
                    const low25 = Math.min(...pm25List);
                    const low10 = Math.min(...pm10List);
                    inAQI = calcAQI(low25);
 
                    document.getElementById('in-aqi').innerText = inAQI;
                    document.getElementById('in-pm25').innerHTML = Math.round(low25) + ' µg/m³';
                    document.getElementById('in-pm10').innerHTML = Math.round(low10) + ' µg/m³';
 
                    const st = document.getElementById('status-text');
                    st.innerText = inAQI <= 15 ? "PRISTINE" : inAQI <= 30 ? "EXCEPTIONAL" : inAQI <= 45 ? "EXCELLENT" : inAQI <= 60 ? "VERY GOOD" : "GOOD";
                }
 
                // --- External Data (Google API) ---
                const gRes = await fetch(`https://airquality.googleapis.com/v1/currentConditions:lookup?key=${GOOGLE_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        location: { latitude: LAT, longitude: LON },
                        extraComputations: ["LOCAL_AQI", "POLLUTANT_CONCENTRATION"]
                    })
                });
                const gData = await gRes.json();
                if (gData && gData.indexes) {
                    const localIdx = gData.indexes.find(i => i.code === 'ind_cpcb') || gData.indexes[0];
                    outAQI = localIdx.aqi;
                    document.getElementById('out-aqi').innerText = outAQI;
 
                    const pm25 = gData.pollutants.find(p => p.code === 'pm25');
                    const pm10 = gData.pollutants.find(p => p.code === 'pm10');
                    if (pm25) document.getElementById('out-pm25').innerHTML = Math.round(pm25.concentration.value) + ' µg/m³';
                    if (pm10) document.getElementById('out-pm10').innerHTML = Math.round(pm10.concentration.value) + ' µg/m³';
                }
 
                // --- Trigger logic ---
                const overlay = document.getElementById('video-overlay');
                const video = document.getElementById('warning-video');
                const dashboard = document.getElementById('dashboard-wrapper');
                const extCard = document.getElementById('external-card');
                const intCard = document.getElementById('internal-card');
                if (inAQI > 100) {
                    overlay.style.display = 'block';
                    dashboard.style.display = 'none';
                    video.muted = true;
                    video.load();
                    video.play().catch(e => console.log("Autoplay blocked", e));
                } else {
                    overlay.style.display = 'none';
                    dashboard.style.display = 'flex';
                    video.pause();
                    video.currentTime = 0;
                    const diff = Math.abs(outAQI - inAQI);
                    if (diff < 50) {
                        intCard.classList.remove('hidden');
                        extCard.classList.add('hidden');
                    } else {
                        intCard.classList.remove('hidden');
                        extCard.classList.remove('hidden');
                    }
                }
            } catch (e) { console.error(e); }
        }
        updateData();
        setInterval(updateData, 300000);
    </script>
</body>
</html>
